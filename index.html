<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="view-transition" content="same-origin">
  <title>Emily Thomas — Product Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Open+Sans:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: '#c799d1',
            body: '#333',
            muted: '#8b8989',
            divider: '#e0e0e0',
          },
          fontFamily: {
            sans: ['proxima-nova', 'Proxima Nova', 'system-ui', '-apple-system', 'sans-serif'],
            heading: ['proxima-nova', 'Proxima Nova', 'sans-serif'],
            serif: ['proxima-nova', 'Proxima Nova', 'sans-serif'],
            nav: ['proxima-nova', 'Proxima Nova', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
      body {
        @apply font-sans text-[15px] text-muted bg-white antialiased;
      }
    }
  </style>
  <style>
    /* Group container morphs size/position — the "expanding box" */
    ::view-transition-group(hero-drive),
    ::view-transition-group(hero-pdf),
    ::view-transition-group(hero-video),
    ::view-transition-group(hero-pims) {
      animation-duration: 0.6s;
      animation-timing-function: cubic-bezier(0.4, 0, 0, 1);
    }
    /* Card snapshot fades out quickly so expansion is the focus */
    ::view-transition-old(hero-drive),
    ::view-transition-old(hero-pdf),
    ::view-transition-old(hero-video),
    ::view-transition-old(hero-pims) {
      animation-duration: 0.15s;
      animation-timing-function: ease-out;
    }
    /* Hero snapshot fades in mid-expansion */
    ::view-transition-new(hero-drive),
    ::view-transition-new(hero-pdf),
    ::view-transition-new(hero-video),
    ::view-transition-new(hero-pims) {
      animation-duration: 0.3s;
      animation-delay: 0.15s;
      animation-timing-function: ease-in;
    }
    /* Page content fades cleanly */
    ::view-transition-old(root) {
      animation-duration: 0.25s;
      animation-timing-function: ease-out;
    }
    ::view-transition-new(root) {
      animation-duration: 0.35s;
      animation-delay: 0.2s;
      animation-timing-function: ease-in;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Nav -->
  <header class="flex justify-between items-center px-[60px] py-[50px] max-md:px-5 max-md:py-[30px]">
    <a href="index.html" class="font-heading text-[13px] font-bold tracking-[1.3px] uppercase text-[#222] no-underline">Emily Thomas</a>
    <nav>
      <a href="index.html" class="font-heading text-[13px] font-semibold tracking-[0.5px] uppercase text-[#222] no-underline ml-[30px] hover:opacity-60">Work</a>
      <a href="about.html" class="font-heading text-[13px] font-semibold tracking-[0.5px] uppercase text-[#222] no-underline ml-[30px] hover:opacity-60">About Me</a>
    </nav>
  </header>

  <!-- Hero -->
  <main class="px-[60px] max-md:px-5">
    <div class="pt-[100px] pb-[36px] text-left max-md:pt-[100px] max-md:pb-[50px]">
      <p class="font-serif text-[56px] font-bold text-body leading-[1.0] max-w-[66%] uppercase max-md:text-[32px]">I'm a Product Designer shaping AI-powered workflows &amp; large-scale systems</p>
    </div>

    <!-- Project Grid -->
    <div class="grid grid-cols-3 gap-x-2 gap-y-6 pb-20 max-md:grid-cols-1">
      <a href="drive-genai-organize.html" class="group block no-underline">
        <div class="overflow-hidden rounded mb-1 aspect-[4/3] relative" style="background: linear-gradient(135deg, #9A80FF, #A7C1FB); view-transition-name: hero-drive;">
          <img src="images/index/project-hmo.png" alt="Google Drive AI File Organizer" class="absolute top-[40px] left-[40px] w-[200%] max-w-none origin-top-left group-hover:scale-105 transition-transform duration-300" style="filter: drop-shadow(0 4px 24px rgba(0,0,0,0.2));">
        </div>
        <p class="font-nav text-[13px] font-bold text-[#222] group-hover:opacity-60 transition-opacity">Google Drive AI File Organizer</p>
      </a>
      <a href="workspace-pdf.html" class="group block no-underline">
        <div class="overflow-hidden rounded mb-1 aspect-[4/3] flex items-center justify-center" style="background: linear-gradient(135deg, #C0D3FF, #99DEFA); view-transition-name: hero-pdf;">
          <img src="images/index/projects-PDFs.png" alt="Google Workspace PDFs" class="max-w-full max-h-full object-contain scale-110 group-hover:scale-105 transition-transform duration-300" style="filter: drop-shadow(0 4px 24px rgba(0,0,0,0.2));">
        </div>
        <p class="font-nav text-[13px] font-bold text-[#222] group-hover:opacity-60 transition-opacity">Google Workspace PDFs</p>
      </a>
      <a href="workspace-video-player.html" class="group block no-underline">
        <div class="overflow-hidden rounded mb-1 aspect-[4/3] bg-cover bg-center" style="background-image: url('images/workspace-video-player/video-hero-background.png'); view-transition-name: hero-video;">
          <img src="images/index/project-video.png" alt="Google Workspace Video Player" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" style="filter: drop-shadow(0 4px 24px rgba(0,0,0,0.2));">
        </div>
        <p class="font-nav text-[13px] font-bold text-[#222] group-hover:opacity-60 transition-opacity">Google Workspace Video Player</p>
      </a>
      <a href="lemonaid-pims.html" class="group block no-underline">
        <div class="overflow-hidden rounded mb-1 aspect-[4/3] flex items-center justify-center" style="background: linear-gradient(135deg, #51e185, #77ebe5); view-transition-name: hero-pims;">
          <img src="images/lemonaid-pims/Portfolio-PIMS-01.png" alt="Lemonaid PIMS" class="max-w-[80%] max-h-[80%] object-contain rounded-lg group-hover:scale-105 transition-transform duration-300" style="filter: drop-shadow(0 4px 24px rgba(0,0,0,0.2));">
        </div>
        <p class="font-nav text-[13px] font-bold text-[#222] group-hover:opacity-60 transition-opacity">Lemonaid PIMS</p>
      </a>
      <div class="block">
        <div class="overflow-hidden rounded mb-1 aspect-[4/3] bg-[#f0f0f0]"></div>
      </div>
      <div class="block">
        <div class="overflow-hidden rounded mb-1 aspect-[4/3] bg-[#f0f0f0]"></div>
      </div>
    </div>
  </main>

</body>
</html>
